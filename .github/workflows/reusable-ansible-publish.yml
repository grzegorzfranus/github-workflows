---
name: "Ansible Galaxy Publish"

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to use"
        type: string
        default: "3.12"
      runner:
        description: "Runner label to execute jobs on"
        type: string
        default: "ubuntu-latest"
    secrets:
      galaxy-api-key:
        description: "Ansible Galaxy API Key"
        required: true

permissions:
  contents: read

jobs:
  # ================================================================
  # 1. PUBLISH TO GALAXY
  # ----------------------------------------------------------------
  # Metadata validation is performed by the caller workflow using
  # reusable-ansible-meta-validate.yml before invoking this workflow.
  # ================================================================
  publish-galaxy:
    name: "📦 Publish to Galaxy"
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    steps:
      - name: "🔍 Checkout repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "⚙️ Set up Python ${{ inputs.python-version }}"
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: "⚙️ Cache pip"
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ inputs.python-version }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ inputs.python-version }}-

      - name: "⚙️ Install ansible-core"
        run: pip install ansible-core

      - name: "📦 Upload to Ansible Galaxy"
        env:
          GALAXY_API_KEY: ${{ secrets.galaxy-api-key }}
        run: |
          owner=$(echo "${{ github.repository }}" | cut -d/ -f1)
          repo=$(echo "${{ github.repository }}" | cut -d/ -f2)

          max_attempts=3
          attempt=1
          success=false

          while [ $attempt -le $max_attempts ]; do
            echo "Attempt $attempt of $max_attempts: Importing role $owner.$repo to Ansible Galaxy..."
            if ansible-galaxy role import --api-key "$GALAXY_API_KEY" "$owner" "$repo"; then
              success=true
              break
            else
              echo "Error: Import failed."
              if [ $attempt -lt $max_attempts ]; then
                sleep_time=$((attempt * 15))
                echo "Waiting $sleep_time seconds before retry..."
                sleep $sleep_time
              fi
            fi
            attempt=$((attempt + 1))
          done

          if [ "$success" = false ]; then
            echo "::error::Failed to publish role after $max_attempts attempts."
            exit 1
          fi
