---
name: "Ansible Galaxy Publish"

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to use"
        type: string
        default: "3.12"
      runner:
        description: "Runner label to execute jobs on"
        type: string
        default: "ubuntu-latest"
    secrets:
      galaxy-api-key:
        description: "Ansible Galaxy API Key"
        required: true

permissions:
  contents: read

jobs:
  # ================================================================
  # 1. PRE-PUBLISH VALIDATION
  # ================================================================
  pre-publish-check:
    name: "Pre-publish Validation"
    runs-on: ${{ inputs.runner }}
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: "Verify meta/main.yml exists"
        run: |
          if [ ! -f meta/main.yml ]; then
            echo "::error::meta/main.yml is missing! This is required to publish an Ansible role."
            exit 1
          fi
          echo "meta/main.yml found — role is publishable"

      - name: "Validate Galaxy description length"
        run: |
          LIMIT=255

          # Extract description using Python/PyYAML for reliable YAML parsing
          DESC=$(python3 -c "
          import yaml, sys
          with open('meta/main.yml') as f:
              data = yaml.safe_load(f)
          desc = data.get('galaxy_info', {}).get('description', '')
          print(desc.strip() if desc else '')
          " 2>/dev/null || echo "")

          if [ -z "$DESC" ]; then
            echo "::warning::No description found in meta/main.yml galaxy_info"
            exit 0
          fi

          LEN=${#DESC}
          echo "Description ($LEN/$LIMIT chars): $DESC"

          if [ "$LEN" -gt "$LIMIT" ]; then
            echo "::error::Galaxy description exceeds $LIMIT characters ($LEN chars). Shorten it to avoid Galaxy import rejection."
            exit 1
          fi

          echo "Description length OK"

  # ================================================================
  # 2. PUBLISH TO GALAXY
  # ================================================================
  publish-galaxy:
    name: "Publish to Galaxy"
    needs: [pre-publish-check]
    runs-on: ${{ inputs.runner }}
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: "Set up Python ${{ inputs.python-version }}"
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: "Cache pip"
        uses: actions/cache@a7833574556fa59680c1b7cb190c1735db73ebf0 # v5.0.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ inputs.python-version }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ inputs.python-version }}-

      - name: "Install ansible-core"
        run: pip install ansible-core

      - name: "Upload to Ansible Galaxy"
        run: |
          owner=$(echo "${{ github.repository }}" | cut -d/ -f1)
          repo=$(echo "${{ github.repository }}" | cut -d/ -f2)

          max_attempts=3
          attempt=1
          success=false

          while [ $attempt -le $max_attempts ]; do
            echo "Attempt $attempt of $max_attempts: Importing role $owner.$repo to Ansible Galaxy..."
            if ansible-galaxy role import --api-key "${{ secrets.galaxy-api-key }}" "$owner" "$repo"; then
              success=true
              break
            else
              echo "Error: Import failed."
              if [ $attempt -lt $max_attempts ]; then
                sleep_time=$((attempt * 15))
                echo "Waiting $sleep_time seconds before retry..."
                sleep $sleep_time
              fi
            fi
            attempt=$((attempt + 1))
          done

          if [ "$success" = false ]; then
            echo "::error::Failed to publish role after $max_attempts attempts."
            exit 1
          fi
