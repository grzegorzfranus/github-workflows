---
name: "Ansible Lint"

on:
  workflow_call:
    inputs:
      ansible-lint-profile:
        description: "ansible-lint profile (e.g., shared, production)"
        type: string
        default: "production"
      python-version:
        description: "Python version to use"
        type: string
        default: "3.12"
      requirements-ci-file:
        description: "Path to CI requirements.txt for pinned tool versions (empty = use defaults)"
        type: string
        default: ""
      enable-galaxy-metadata-check:
        description: "[DEPRECATED] Moved to reusable-ansible-meta-validate.yml — this input is ignored"
        type: boolean
        default: true
      runner:
        description: "Runner label to execute jobs on"
        type: string
        default: "ubuntu-latest"

permissions:
  contents: read

jobs:
  # ================================================================
  # 1. YAML SYNTAX VALIDATION
  # ================================================================
  yaml-lint:
    name: "🔍 Validate YAML Syntax"
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    steps:
      - name: "🔍 Checkout repository"
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: "⚙️ Set up Python ${{ inputs.python-version }}"
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: "⚙️ Cache pip"
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ inputs.python-version }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ inputs.python-version }}-

      - name: "⚙️ Install yamllint"
        env:
          REQUIREMENTS_CI_FILE: ${{ inputs.requirements-ci-file }}
        run: |
          if [ -n "$REQUIREMENTS_CI_FILE" ] && [ -f "$REQUIREMENTS_CI_FILE" ]; then
            pip install -r "$REQUIREMENTS_CI_FILE"
          else
            pip install yamllint
          fi

      - name: "🔍 Lint YAML files"
        run: yamllint .

  # ================================================================
  # 2. ANSIBLE LINT
  # ================================================================
  ansible-lint:
    name: "🔍 Validate Ansible Coding Standards"
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    steps:
      - name: "🔍 Checkout repository"
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: "⚙️ Set up Python ${{ inputs.python-version }}"
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: "⚙️ Cache pip"
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ inputs.python-version }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ inputs.python-version }}-

      - name: "⚙️ Install ansible-lint"
        env:
          REQUIREMENTS_CI_FILE: ${{ inputs.requirements-ci-file }}
        run: |
          if [ -n "$REQUIREMENTS_CI_FILE" ] && [ -f "$REQUIREMENTS_CI_FILE" ]; then
            pip install -r "$REQUIREMENTS_CI_FILE"
          else
            pip install ansible-lint
          fi

      - name: "🔍 Run ansible-lint"
        env:
          ANSIBLE_LINT_PROFILE: ${{ inputs.ansible-lint-profile }}
        run: ansible-lint --profile "$ANSIBLE_LINT_PROFILE" .

  # ================================================================
  # 3. LINT GATE
  # ================================================================
  lint-gate:
    name: "✅ Lint Gate"
    needs: [yaml-lint, ansible-lint]
    if: always()
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 5
    steps:
      - name: "⚙️ Evaluate results"
        env:
          YAML_LINT_RESULT: ${{ needs.yaml-lint.result }}
          ANSIBLE_LINT_RESULT: ${{ needs.ansible-lint.result }}
        run: |
          echo "YAML Lint:        $YAML_LINT_RESULT"
          echo "Ansible Lint:     $ANSIBLE_LINT_RESULT"

          has_failures=0

          if [[ "$YAML_LINT_RESULT" == "failure" || "$YAML_LINT_RESULT" == "cancelled" ]]; then
            echo "::error::YAML Lint failed or was cancelled"
            has_failures=1
          fi

          if [[ "$ANSIBLE_LINT_RESULT" == "failure" || "$ANSIBLE_LINT_RESULT" == "cancelled" ]]; then
            echo "::error::Ansible Lint failed or was cancelled"
            has_failures=1
          fi

          if [[ "$has_failures" -ne 0 ]]; then
            exit 1
          fi

          echo "All lint validations passed successfully"
