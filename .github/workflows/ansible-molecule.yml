---
name: "Ansible Molecule Testing"

on:
  workflow_call:
    inputs:
      molecule-scenarios:
        description: "JSON array of scenarios to run (e.g., '[\"default\"]')"
        type: string
        default: '["default"]'
      molecule-distros:
        description: "JSON array of distros to test against (e.g., '[\"ubuntu2404\", \"debian12\", \"rockylinux9\"]')"
        type: string
        default: '["ubuntu2404", "debian12", "rockylinux9"]'
      python-version:
        description: "Python version to use"
        type: string
        default: "3.12"
      molecule-timeout:
        description: "Timeout in minutes for Molecule test jobs"
        type: number
        default: 30
      requirements-ci-file:
        description: "Path to CI requirements.txt for pinned tool versions (empty = use defaults)"
        type: string
        default: ""
      runner:
        description: "Runner label to execute jobs on"
        type: string
        default: "ubuntu-latest"

permissions:
  contents: read

jobs:
  # ================================================================
  # 1. ANSIBLE SYNTAX CHECK
  # ================================================================
  syntax-check:
    name: "Playbook Syntax Check"
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: "Set up Python ${{ inputs.python-version }}"
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: "Cache pip"
        uses: actions/cache@a7833574556fa59680c1b7cb190c1735db73ebf0 # v5.0.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ inputs.python-version }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ inputs.python-version }}-

      - name: "Install ansible-core"
        run: |
          if [ -n "${{ inputs.requirements-ci-file }}" ] && [ -f "${{ inputs.requirements-ci-file }}" ]; then
            pip install -r "${{ inputs.requirements-ci-file }}"
          else
            pip install ansible-core
          fi

      - name: "Run syntax check on all playbooks"
        run: |
          exit_code=0
          found=0
          while IFS= read -r -d '' playbook; do
            found=1
            echo "Checking: $playbook"
            if ! ansible-playbook --syntax-check "$playbook"; then
              exit_code=1
            fi
          done < <(find . -name "*.yml" -path "*/molecule/*/converge.yml" -print0 \
                    -o -name "*.yml" -path "*/molecule/*/verify.yml" -print0 \
                    -o -name "*.yml" -path "*/molecule/*/prepare.yml" -print0 \
                    -o -name "*.yml" -path "*/playbooks/*.yml" -print0)
          if [ "$found" -eq 0 ]; then
            echo "No playbooks found to check — skipping"
          fi
          exit $exit_code

  # ================================================================
  # 2. MOLECULE TEST MATRIX
  # ================================================================
  molecule-test:
    name: "Molecule — ${{ matrix.scenario }} / ${{ matrix.distro }}"
    needs: [syntax-check]
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.molecule-timeout }}
    strategy:
      fail-fast: false
      matrix:
        scenario: ${{ fromJSON(inputs.molecule-scenarios) }}
        distro: ${{ fromJSON(inputs.molecule-distros) }}
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: "Set up Python ${{ inputs.python-version }}"
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: "Cache pip"
        uses: actions/cache@a7833574556fa59680c1b7cb190c1735db73ebf0 # v5.0.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ inputs.python-version }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ inputs.python-version }}-

      - name: "Install dependencies"
        run: |
          if [ -n "${{ inputs.requirements-ci-file }}" ] && [ -f "${{ inputs.requirements-ci-file }}" ]; then
            pip install -r "${{ inputs.requirements-ci-file }}"
          else
            pip install ansible molecule molecule-plugins[docker] docker
          fi

      - name: "Run Molecule test (with idempotency)"
        run: molecule test --scenario-name ${{ matrix.scenario }}
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          MOLECULE_DISTRO: ${{ matrix.distro }}

  # ================================================================
  # 3. MOLECULE GATE
  # ================================================================
  molecule-gate:
    name: "Molecule Gate"
    needs: [syntax-check, molecule-test]
    if: always()
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 5
    steps:
      - name: "Evaluate results"
        run: |
          echo "Syntax Check:  ${{ needs.syntax-check.result }}"
          echo "Molecule Test: ${{ needs.molecule-test.result }}"

          has_failures=0

          if [[ "${{ needs.syntax-check.result }}" == "failure" || "${{ needs.syntax-check.result }}" == "cancelled" ]]; then
            echo "::error::Playbook Syntax Check failed or was cancelled"
            has_failures=1
          fi

          if [[ "${{ needs.molecule-test.result }}" == "failure" || "${{ needs.molecule-test.result }}" == "cancelled" ]]; then
            echo "::error::Molecule Test failed or was cancelled"
            has_failures=1
          fi

          if [[ "$has_failures" -ne 0 ]]; then
            exit 1
          fi

          echo "All molecule integrations tests passed successfully"
