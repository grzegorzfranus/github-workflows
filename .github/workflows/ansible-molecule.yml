---
name: "Ansible Molecule Testing"

on:
  workflow_call:
    inputs:
      molecule-scenarios:
        description: "JSON array of scenarios to run (e.g., '[\"default\"]')"
        type: string
        default: '["default"]'
      molecule-distros:
        description: "JSON array of distros to test against (e.g., '[\"ubuntu2404\", \"debian12\", \"rockylinux9\"]')"
        type: string
        default: '["ubuntu2404", "debian12", "rockylinux9"]'
      python-version:
        description: "Python version to use"
        type: string
        default: "3.12"
      molecule-timeout:
        description: "Timeout in minutes for Molecule test jobs"
        type: number
        default: 30
      requirements-ci-file:
        description: "Path to CI requirements.txt for pinned tool versions (empty = use defaults)"
        type: string
        default: ""
      runner:
        description: "Runner label to execute jobs on"
        type: string
        default: "ubuntu-latest"

permissions:
  contents: read

jobs:
  # ================================================================
  # 1. ANSIBLE SYNTAX CHECK
  # ================================================================
  syntax-check:
    name: "🔍 Playbook Syntax Check"
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    steps:
      - name: "🔍 Checkout repository"
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: "⚙️ Set up Python ${{ inputs.python-version }}"
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: "⚙️ Cache pip"
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ inputs.python-version }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ inputs.python-version }}-

      - name: "⚙️ Install ansible-core"
        env:
          REQUIREMENTS_CI_FILE: ${{ inputs.requirements-ci-file }}
        run: |
          if [ -n "$REQUIREMENTS_CI_FILE" ] && [ -f "$REQUIREMENTS_CI_FILE" ]; then
            pip install -r "$REQUIREMENTS_CI_FILE"
          else
            pip install ansible-core
          fi

      - name: "⚙️ Install Ansible collections"
        run: |
          if [ -f "requirements.yml" ]; then
            ansible-galaxy collection install -r requirements.yml
          else
            echo "No requirements.yml found — skipping collection install"
          fi

      - name: "🔍 Run syntax check on all playbooks"
        run: |
          exit_code=0
          found=0
          while IFS= read -r -d '' playbook; do
            found=1
            echo "Checking: $playbook"
            if ! ansible-playbook --syntax-check "$playbook"; then
              exit_code=1
            fi
          done < <(find . -name "*.yml" -path "*/molecule/*/converge.yml" -print0 \
                    -o -name "*.yml" -path "*/molecule/*/verify.yml" -print0 \
                    -o -name "*.yml" -path "*/molecule/*/prepare.yml" -print0 \
                    -o -name "*.yml" -path "*/playbooks/*.yml" -print0)
          if [ "$found" -eq 0 ]; then
            echo "No playbooks found to check — skipping"
          fi
          exit $exit_code

  # ================================================================
  # 2. MOLECULE TEST MATRIX
  # ================================================================
  molecule-test:
    name: "🧪 Molecule — ${{ matrix.scenario }} / ${{ matrix.distro }}"
    needs: [syntax-check]
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.molecule-timeout }}
    strategy:
      fail-fast: false
      matrix:
        scenario: ${{ fromJSON(inputs.molecule-scenarios) }}
        distro: ${{ fromJSON(inputs.molecule-distros) }}
    steps:
      - name: "🔍 Checkout repository"
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: "⚙️ Set up Python ${{ inputs.python-version }}"
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: "⚙️ Cache pip"
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ inputs.python-version }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ inputs.python-version }}-

      - name: "⚙️ Install dependencies"
        env:
          REQUIREMENTS_CI_FILE: ${{ inputs.requirements-ci-file }}
        run: |
          if [ -n "$REQUIREMENTS_CI_FILE" ] && [ -f "$REQUIREMENTS_CI_FILE" ]; then
            pip install -r "$REQUIREMENTS_CI_FILE"
          else
            pip install ansible molecule molecule-plugins[docker] docker
          fi

      - name: "🧪 Run Molecule test (with idempotency)"
        env:
          MOLECULE_SCENARIO: ${{ matrix.scenario }}
          MOLECULE_DISTRO: ${{ matrix.distro }}
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
        run: molecule test --scenario-name "$MOLECULE_SCENARIO"

  # ================================================================
  # 3. MOLECULE GATE
  # ================================================================
  molecule-gate:
    name: "✅ Molecule Gate"
    needs: [syntax-check, molecule-test]
    if: always()
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 5
    steps:
      - name: "⚙️ Evaluate results"
        env:
          SYNTAX_CHECK_RESULT: ${{ needs.syntax-check.result }}
          MOLECULE_TEST_RESULT: ${{ needs.molecule-test.result }}
        run: |
          echo "Syntax Check:  $SYNTAX_CHECK_RESULT"
          echo "Molecule Test: $MOLECULE_TEST_RESULT"

          has_failures=0

          if [[ "$SYNTAX_CHECK_RESULT" == "failure" || "$SYNTAX_CHECK_RESULT" == "cancelled" ]]; then
            echo "::error::Playbook Syntax Check failed or was cancelled"
            has_failures=1
          fi

          if [[ "$MOLECULE_TEST_RESULT" == "failure" || "$MOLECULE_TEST_RESULT" == "cancelled" ]]; then
            echo "::error::Molecule Test failed or was cancelled"
            has_failures=1
          fi

          if [[ "$has_failures" -ne 0 ]]; then
            exit 1
          fi

          echo "All molecule integrations tests passed successfully"
