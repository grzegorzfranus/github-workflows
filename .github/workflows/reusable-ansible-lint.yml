---
name: "Ansible Lint"

on:
  workflow_call:
    inputs:
      ansible-lint-profile:
        description: "ansible-lint profile (e.g., shared, production)"
        type: string
        default: "production"
      python-version:
        description: "Python version to use"
        type: string
        default: "3.12"
      requirements-ci-file:
        description: "Path to CI requirements.txt for pinned tool versions (empty = use defaults)"
        type: string
        default: ""
      enable-galaxy-metadata-check:
        description: "Enable Galaxy meta/main.yml validation"
        type: boolean
        default: true
      runner:
        description: "Runner label to execute jobs on"
        type: string
        default: "ubuntu-latest"

permissions:
  contents: read

jobs:
  # ================================================================
  # 1. YAML SYNTAX VALIDATION
  # ================================================================
  yaml-lint:
    name: "🔍 Validate YAML Syntax"
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    steps:
      - name: "🔍 Checkout repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "⚙️ Set up Python ${{ inputs.python-version }}"
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: "⚙️ Cache pip"
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ inputs.python-version }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ inputs.python-version }}-

      - name: "⚙️ Install yamllint"
        env:
          REQUIREMENTS_CI_FILE: ${{ inputs.requirements-ci-file }}
        run: |
          if [ -n "$REQUIREMENTS_CI_FILE" ] && [ -f "$REQUIREMENTS_CI_FILE" ]; then
            pip install -r "$REQUIREMENTS_CI_FILE"
          else
            pip install yamllint
          fi

      - name: "🔍 Lint YAML files"
        run: yamllint .

  # ================================================================
  # 2. ANSIBLE LINT
  # ================================================================
  ansible-lint:
    name: "🔍 Validate Ansible Coding Standards"
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    steps:
      - name: "🔍 Checkout repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "⚙️ Set up Python ${{ inputs.python-version }}"
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: "⚙️ Cache pip"
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ inputs.python-version }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ inputs.python-version }}-

      - name: "⚙️ Install ansible-lint"
        env:
          REQUIREMENTS_CI_FILE: ${{ inputs.requirements-ci-file }}
        run: |
          if [ -n "$REQUIREMENTS_CI_FILE" ] && [ -f "$REQUIREMENTS_CI_FILE" ]; then
            pip install -r "$REQUIREMENTS_CI_FILE"
          else
            pip install ansible-lint
          fi

      - name: "🔍 Run ansible-lint"
        env:
          ANSIBLE_LINT_PROFILE: ${{ inputs.ansible-lint-profile }}
        run: ansible-lint --profile "$ANSIBLE_LINT_PROFILE" .

  # ================================================================
  # 3. GALAXY METADATA VALIDATION
  # ================================================================
  galaxy-metadata-check:
    name: "🔍 Validate Galaxy Metadata"
    if: ${{ inputs.enable-galaxy-metadata-check }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 5
    steps:
      - name: "🔍 Checkout repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "🔍 Validate meta/main.yml"
        run: |
          if [ ! -f meta/main.yml ]; then
            echo "::warning::meta/main.yml not found — skipping Galaxy validation"
            exit 0
          fi

          echo "Validating Galaxy metadata..."

          python3 -c "
          import yaml, sys
          with open('meta/main.yml') as f:
              data = yaml.safe_load(f)
          gi = data.get('galaxy_info', {})
          errors = []
          for field in ['author', 'description', 'license', 'min_ansible_version']:
              if not gi.get(field):
                  errors.append(f'Missing required field: galaxy_info.{field}')
          desc = gi.get('description', '')
          if desc and len(desc) > 255:
              errors.append(f'Description too long: {len(desc)}/255 chars')
          if not gi.get('platforms'):
              errors.append('No platforms defined in galaxy_info')
          if errors:
              for e in errors:
                  print(f'::error::{e}')
              sys.exit(1)
          print('Galaxy metadata validation passed')
          "

  # ================================================================
  # 4. LINT GATE
  # ================================================================
  lint-gate:
    name: "✅ Lint Gate"
    needs: [yaml-lint, ansible-lint, galaxy-metadata-check]
    if: always()
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 5
    steps:
      - name: "⚙️ Evaluate results"
        run: |
          echo "YAML Lint:        ${{ needs.yaml-lint.result }}"
          echo "Ansible Lint:     ${{ needs.ansible-lint.result }}"
          echo "Galaxy Metadata:  ${{ needs.galaxy-metadata-check.result }}"

          has_failures=0

          if [[ "${{ needs.yaml-lint.result }}" == "failure" || "${{ needs.yaml-lint.result }}" == "cancelled" ]]; then
            echo "::error::YAML Lint failed or was cancelled"
            has_failures=1
          fi

          if [[ "${{ needs.ansible-lint.result }}" == "failure" || "${{ needs.ansible-lint.result }}" == "cancelled" ]]; then
            echo "::error::Ansible Lint failed or was cancelled"
            has_failures=1
          fi

          if [[ "${{ needs.galaxy-metadata-check.result }}" == "failure" || "${{ needs.galaxy-metadata-check.result }}" == "cancelled" ]]; then
            echo "::error::Galaxy Metadata check failed or was cancelled"
            has_failures=1
          fi

          if [[ "$has_failures" -ne 0 ]]; then
            exit 1
          fi

          echo "All lint validations passed successfully"
