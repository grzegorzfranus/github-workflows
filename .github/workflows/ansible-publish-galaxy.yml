---
name: "Ansible Publish Orchestrator"

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to use"
        type: string
        default: "3.12"
      runner:
        description: "Runner label to execute jobs on"
        type: string
        default: "ubuntu-latest"
    secrets:
      galaxy-api-key:
        description: "Ansible Galaxy API Key"
        required: true

permissions:
  contents: read

jobs:
  # ================================================================
  # 1. RUN PUBLISH WORKFLOW
  # ================================================================
  publish:
    name: "Publish"
    uses: ./.github/workflows/ansible-publish.yml
    with:
      python-version: ${{ inputs.python-version }}
      runner: ${{ inputs.runner }}
    secrets:
      galaxy-api-key: ${{ secrets.galaxy-api-key }}
